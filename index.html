<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zetwerk Assessment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 56px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #1a1a2e;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .logo span { color: #e63946; }

    .subtitle {
      font-size: 0.95rem;
      color: #6b7280;
      margin-bottom: 36px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #f1f3f5;
    }

    .info-row:last-of-type { border-bottom: none; }

    .label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .value {
      font-size: 0.97rem;
      font-weight: 500;
      color: #111827;
    }

    .badge {
      margin-top: 32px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ecfdf5;
      color: #065f46;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 999px;
    }

    .dot {
      width: 8px; height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Zetwerk</div>
    <div class="subtitle">Candidate Assessment Environment</div>

    <div class="info-row">
      <span class="label">Assessment ID</span>
      <span class="value">ZW-2026-001</span>
    </div>
    <div class="info-row">
      <span class="label">Candidate ID</span>
      <span class="value">sandeepreddymunagala@gmail.com</span>
    </div>
    <div class="info-row">
      <span class="label">Instance IP</span>
      <span class="value">172.31.1.86</span>
    </div>

    <div class="badge">
      <div class="dot"></div>
      Environment is live
    </div>
  </div>
</body>
</html>
